name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npmjs.org + GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run lint

      - name: Run tests
        run: npx vitest run

      # ── Publish to npmjs.org ──────────────────────────────────────────────
      - name: Configure npm registry for npmjs.org
        run: |
          echo "registry=https://registry.npmjs.org/" >> .npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

      - name: Publish to npmjs.org
        run: npm publish --access public

      # ── Publish to GitHub Packages ────────────────────────────────────────
      - name: Configure npm registry for GitHub Packages
        run: |
          echo "@vitorvilaca3011:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc

      - name: Publish to GitHub Packages
        run: |
          cp package.json package.json.bak
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@vitorvilaca3011/saros-proxy';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --access public
          mv package.json.bak package.json
